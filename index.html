<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Trato</title>

  <style>

    body{
      font-family:Arial,sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:0;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .wrapper{
      width:100%;
      display:flex;
      justify-content:center;
      padding:15px;
      box-sizing:border-box;
    }

    .container{
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 15px rgba(0,0,0,.1);
      width:100%;
      max-width:420px;
      box-sizing:border-box;
    }

    .topo{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom:20px;
    }

    .logo{
      width:55px;
      height:55px;
      object-fit:contain;
    }

    h2{
      margin:0;
      font-size:28px;
    }

    label{
      font-size:14px;
      font-weight:bold;
    }

    input, button{
      width:100%;
      padding:12px;
      margin:6px 0 12px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
      box-sizing:border-box;
    }

    button{
      background:#2e7d32;
      color:#fff;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#1b5e20;
    }

    .resultado{
      margin-top:15px;
      background:#eef;
      padding:12px;
      border-radius:8px;
      font-size:14px;
      line-height:1.7;
    }

    .subtitulo{
      margin-top:10px;
      font-size:15px;
      font-weight:bold;
      color:#444;
    }

  </style>
</head>

<body>

<div class="wrapper">

  <div class="container">

    <div class="topo">
      <img src="logo.png" class="logo">
      <h2>Calculadora de Trato</h2>
    </div>

    <label>Total de animais inicial:</label>
    <input type="number" id="animais" value="20">

    <label>Animais que saíram:</label>
    <input type="number" id="saida" value="0">

    <label>Ração por dia (kg):</label>
    <input type="number" id="racao" value="547">

    <div class="subtitulo">
      Quantidade já fornecida
    </div>

    <label>1º trato já fornecido (kg):</label>
    <input type="number" id="fornecido1" value="0">

    <label>2º trato já fornecido (kg):</label>
    <input type="number" id="fornecido2" value="0">

    <button onclick="calcular()">
      Calcular
    </button>

    <div class="resultado" id="resultado"></div>

  </div>

</div>

<script>

function calcular(){

  const animais =
    parseFloat(document.getElementById('animais').value) || 0;

  const saida =
    parseFloat(document.getElementById('saida').value) || 0;

  const racao =
    parseFloat(document.getElementById('racao').value) || 0;

  const fornecido1 =
    parseFloat(document.getElementById('fornecido1').value) || 0;

  const fornecido2 =
    parseFloat(document.getElementById('fornecido2').value) || 0;

  const animaisRestantes = animais - saida;

  if(animais <= 0 || racao <= 0){

    document.getElementById('resultado').innerHTML =
      'Preencha os dados corretamente.';

    return;
  }

  if(animaisRestantes <= 0){

    document.getElementById('resultado').innerHTML =
      'Erro: quantidade de animais restante inválida.';

    return;
  }

  // consumo individual
  const racaoPorAnimal = racao / animais;

  // desconto dos animais que saíram
  const consumoSaida = racaoPorAnimal * saida;

  // total ajustado
  const racaoAjustada = racao - consumoSaida;

  // quanto já foi fornecido
  const totalFornecido = fornecido1 + fornecido2;

  // restante
  const restante = racaoAjustada - totalFornecido;

  if(restante < 0){

    document.getElementById('resultado').innerHTML =
      'Erro: quantidade fornecida maior que o total disponível.';

    return;
  }

  let resultado = `
    <strong>
      ➡ Restante a fornecer: ${restante.toFixed(2)} kg
    </strong><br><br>
  `;

  // nenhum trato fornecido
  if(fornecido1 == 0 && fornecido2 == 0){

    let t1 = restante * 0.30;
    let t2 = restante * 0.30;
    let t3 = restante * 0.40;

    resultado += `
      1º Trato: ${t1.toFixed(2)} kg → ${(t1/animaisRestantes).toFixed(2)} kg/cab<br>
      2º Trato: ${t2.toFixed(2)} kg → ${(t2/animaisRestantes).toFixed(2)} kg/cab<br>
      3º Trato: ${t3.toFixed(2)} kg → ${(t3/animaisRestantes).toFixed(2)} kg/cab
    `;
  }

  // primeiro já fornecido
  else if(fornecido1 > 0 && fornecido2 == 0){

    let t2 = restante * 0.43;
    let t3 = restante * 0.57;

    resultado += `
      ✅ 1º trato já fornecido: ${fornecido1.toFixed(2)} kg<br><br>

      2º Trato: ${t2.toFixed(2)} kg → ${(t2/animaisRestantes).toFixed(2)} kg/cab<br>
      3º Trato: ${t3.toFixed(2)} kg → ${(t3/animaisRestantes).toFixed(2)} kg/cab
    `;
  }

  // primeiro e segundo fornecidos
  else{

    let t3 = restante;

    resultado += `
      ✅ 1º trato já fornecido: ${fornecido1.toFixed(2)} kg<br>
      ✅ 2º trato já fornecido: ${fornecido2.toFixed(2)} kg<br><br>

      3º Trato: ${t3.toFixed(2)} kg → ${(t3/animaisRestantes).toFixed(2)} kg/cab
    `;
  }

  document.getElementById('resultado').innerHTML = resultado;
}

</script>

</body>
</html>
